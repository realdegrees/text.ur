name: CI/CD

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IS_MAIN: ${{ github.ref == 'refs/heads/main' }}
  IS_DEVELOP: ${{ github.ref == 'refs/heads/develop' }}

jobs:
  # ============================================
  # Stage 1: Detect Changes
  # ============================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      models: ${{ steps.filter.outputs.models }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            models:
              - 'backend/app/models/**'
              - 'backend/database/**'

  # ============================================
  # Stage 2: Linting
  # ============================================
  lint-backend:
    name: Lint Backend (Ruff)
    needs: changes
    if: github.ref == 'refs/heads/main' || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install --no-cache-dir ruff==0.15.1
      - name: Run ruff
        working-directory: ./backend
        run: ruff check .

  lint-frontend:
    name: Lint Frontend (ESLint)
    needs: changes
    if: github.ref == 'refs/heads/main' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install --workspace-root
      - name: Run eslint
        working-directory: ./frontend
        run: pnpm run lint

  # ============================================
  # Stage 3: Validation
  # ============================================
  validate-migrations:
    name: Validate Migrations
    needs: [changes, lint-backend]
    if: |
      always() &&
      (github.ref == 'refs/heads/main' || needs.changes.outputs.models == 'true') &&
      (needs.lint-backend.result == 'success' || needs.lint-backend.result == 'skipped')
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      POSTGRES_DB: test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq build-essential
      - name: Install Python dependencies
        working-directory: ./backend
        run: |
          python -m venv venv
          . venv/bin/activate
          pip install -r requirements.txt
      - name: Initialize database
        working-directory: ./backend/database
        run: |
          . ../venv/bin/activate
          alembic stamp base
          alembic upgrade head
      - name: Validate migrations
        working-directory: ./backend/database
        run: |
          . ../venv/bin/activate
          alembic revision --autogenerate -m "ci" --rev-id=generated
          REVISION="versions/generated_ci.py"
          if grep -q "op\." "$REVISION"; then
            echo "Migration scripts are not in sync with the table models."
            cat "$REVISION"
            exit 1
          else
            echo "Migration files validated successfully"
            exit 0
          fi

  validate-types:
    name: Validate Zod Types
    needs: [changes, lint-backend, lint-frontend]
    if: |
      always() &&
      (github.ref == 'refs/heads/main' || needs.changes.outputs.models == 'true') &&
      (needs.lint-backend.result == 'success' || needs.lint-backend.result == 'skipped') &&
      (needs.lint-frontend.result == 'success' || needs.lint-frontend.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq build-essential
      - name: Install Python dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt
      - name: Install Node dependencies
        working-directory: ./frontend
        run: pnpm install
      - name: Generate types
        working-directory: ./frontend
        run: pnpm run typegen
      - name: Check for differences
        run: |
          git add .
          git status
          if git status | grep -q ".*api.ts"; then
            echo "API types were not generated correctly, run pydantic2ts and ts-to-zod locally and commit the generated schemas and types."
            exit 1
          else
            echo "Generated API schemas and types validated successfully"
          fi

  # ============================================
  # Stage 4: Build
  # ============================================
  build-frontend:
    name: Build Frontend
    needs: [changes, lint-frontend, validate-types]
    if: |
      always() &&
      (github.ref == 'refs/heads/main' || needs.changes.outputs.frontend == 'true') &&
      (needs.lint-frontend.result == 'success' || needs.lint-frontend.result == 'skipped') &&
      (needs.validate-types.result == 'success' || needs.validate-types.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install --workspace-root
      - name: Build frontend
        working-directory: ./frontend
        run: pnpm run build

  # ============================================
  # Stage 5: Tests
  # ============================================
  test-backend:
    name: Test Backend (Pytest)
    needs: [changes, lint-backend, validate-migrations]
    if: |
      always() &&
      (github.ref == 'refs/heads/main' || needs.changes.outputs.backend == 'true') &&
      (needs.lint-backend.result == 'success' || needs.lint-backend.result == 'skipped') &&
      (needs.validate-migrations.result == 'success' || needs.validate-migrations.result == 'skipped')
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      POSTGRES_DB: test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_PORT: 5432
      POSTGRES_HOST: localhost
      STORAGE_DIR: /tmp/textur-storage
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq build-essential
      - name: Install Python dependencies
        working-directory: ./backend
        run: |
          python -m venv venv
          . venv/bin/activate
          pip install -r requirements.txt
      - name: Generate JWT secret
        run: echo "JWT_SECRET=$(openssl rand -hex 32)" >> $GITHUB_ENV
      - name: Initialize database and storage
        working-directory: ./backend/database
        run: |
          . ../venv/bin/activate
          alembic stamp base
          alembic upgrade head
          mkdir -p $STORAGE_DIR
      - name: Run pytest
        working-directory: ./backend
        run: |
          . venv/bin/activate
          pytest --cov=app --cov-report=html:coverage --cov-report=term
      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

  test-frontend:
    name: Test Frontend (Vitest)
    needs: [changes, lint-frontend, build-frontend]
    if: |
      always() &&
      (github.ref == 'refs/heads/main' || needs.changes.outputs.frontend == 'true') &&
      (needs.lint-frontend.result == 'success' || needs.lint-frontend.result == 'skipped') &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install --workspace-root
      - name: Run vitest
        working-directory: ./frontend
        run: pnpm run test:coverage
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  # ============================================
  # Stage 6: Dockerize (only on push to main/develop)
  # ============================================
  dockerize-backend:
    name: Dockerize Backend
    needs: [changes, lint-backend, validate-migrations, test-backend]
    if: |
      always() &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || needs.changes.outputs.backend == 'true') &&
      (needs.lint-backend.result == 'success' || needs.lint-backend.result == 'skipped') &&
      (needs.validate-migrations.result == 'success' || needs.validate-migrations.result == 'skipped') &&
      (needs.test-backend.result == 'success' || needs.test-backend.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=stable,enable=${{ github.ref == 'refs/heads/main' }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  dockerize-frontend:
    name: Dockerize Frontend
    needs: [changes, lint-frontend, validate-types, build-frontend, test-frontend]
    if: |
      always() &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || needs.changes.outputs.frontend == 'true') &&
      (needs.lint-frontend.result == 'success' || needs.lint-frontend.result == 'skipped') &&
      (needs.validate-types.result == 'success' || needs.validate-types.result == 'skipped') &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped') &&
      (needs.test-frontend.result == 'success' || needs.test-frontend.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=stable,enable=${{ github.ref == 'refs/heads/main' }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
